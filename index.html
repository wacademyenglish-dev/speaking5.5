<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLF LABS | IELTS Speaking Foundation</title>
    
    <!-- Epic & Academic Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800;900&family=Inter:wght@300;400;600;800;900&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- WOLF LABS ENGINE: IELTS PRESTIGE THEME (OXFORD BLUE & GOLD) --- */
        :root {
            --bg: #030811;
            --surface: rgba(10, 20, 40, 0.85);
            --surface-hover: rgba(212, 175, 55, 0.1);
            --border: rgba(212, 175, 55, 0.3);
            --accent: #D4AF37; 
            --accent-glow: rgba(212, 175, 55, 0.3);
            --correct: #1DB954;
            --incorrect: #E50914; 
            --text-main: #FFFFFF;
            --text-dim: #A1A1AA;
            --font-display: 'Cinzel', serif;
            --font-academic: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(to top, rgba(3,8,17,1) 5%, rgba(3,8,17,0.8) 100%), 
                        url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?q=80&w=2000&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- AMBIENT ORBS --- */
        .ambient-orbs {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0; overflow: hidden; pointer-events: none;
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(150px); opacity: 0.15;
            animation: floatOrb 20s infinite alternate ease-in-out;
        }
        .orb-1 { width: 600px; height: 600px; background: var(--accent); top: -20%; left: -10%; }
        .orb-2 { width: 500px; height: 500px; background: #002244; bottom: -20%; right: -10%; animation-delay: -5s; }

        @keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-8px); } 50% { transform: translateX(8px); } }
        @keyframes pulseAlert { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* --- LAYOUT FULL-SCREEN --- */
        main {
            flex: 1; width: 100%; max-width: 1200px; margin: 0 auto;
            padding-top: 100px; padding-bottom: 150px;
            display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 10;
        }
        
        .step {
            position: absolute; width: 100%; max-width: 950px;
            opacity: 0; pointer-events: none; transform: scale(0.96);
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            visibility: hidden;
            max-height: 80vh; overflow-y: auto; padding: 20px;
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent;
        }
        .step::-webkit-scrollbar { width: 4px; }
        .step::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        
        .step.active {
            opacity: 1; pointer-events: auto; transform: scale(1);
            visibility: visible; position: relative;
        }

        /* --- GLASSMORPHISM PANELS --- */
        .glass-panel {
            background: linear-gradient(135deg, rgba(15,25,45,0.85) 0%, rgba(5,10,25,0.95) 100%);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border); border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(212, 175, 55, 0.15);
            padding: 50px; position: relative; z-index: 10; width: 100%;
        }

        .dual-panel { display: flex; gap: 50px; align-items: flex-start; width: 100%; }
        .dual-panel > * { flex: 1; }
        .divider { width: 2px; height: auto; background: linear-gradient(to bottom, transparent, var(--accent), transparent); opacity: 0.3; }
        @media (max-width: 850px) { .dual-panel { flex-direction: column; gap: 30px; } .divider { display: none; } }

        /* --- TYPOGRAPHY & BUTTONS --- */
        h1, h2, h3 { font-family: var(--font-display); letter-spacing: 1px; text-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-bottom: 20px;}
        h1 { font-size: 4.5rem; line-height: 1.1; color: #fff; }
        h2 { font-size: 2.2rem; color: var(--accent); display: flex; align-items: center; gap: 15px;}
        p { font-size: 1.15rem; color: var(--text-dim); margin-bottom: 20px; line-height: 1.7;}

        .code-tag { font-family: var(--font-body); font-weight: 800; color: var(--accent); font-size: 0.8rem; background: rgba(212, 175, 55, 0.1); padding: 4px 12px; border-radius: 4px; letter-spacing: 2px; border: 1px solid rgba(212, 175, 55, 0.2); text-transform: uppercase; display: inline-block;}

        .btn {
            padding: 16px 40px; border: none; border-radius: 8px; font-family: var(--font-display);
            font-size: 1.1rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 10px;
            background: #fff; color: #000; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .btn-accent { background: var(--accent); color: #000; box-shadow: 0 10px 30px var(--accent-glow); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px var(--accent-glow); }
        .btn:disabled { opacity: 0.3; pointer-events: none; }

        /* --- UI CONTROLS --- */
        .controls { display: flex; gap: 15px; }
        .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--accent); width: 45px; height: 45px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; backdrop-filter: blur(10px); font-size: 1.2rem;}
        .icon-btn:hover { background: var(--accent); color: #000; transform: translateY(-2px); }

        /* --- SPEAKING HUB --- */
        .speaking-hub {
            margin-top: 40px; padding: 30px; background: rgba(212, 175, 55, 0.05);
            border-radius: 12px; border: 1px solid var(--accent-glow); position: relative;
        }
        .speaking-hub::before {
            content: '🗣️ EXAMINER COMMS'; position: absolute; top: -14px; left: 30px;
            background: var(--accent); color: #000; font-family: var(--font-body); font-size: 0.75rem;
            font-weight: 900; padding: 6px 16px; border-radius: 4px; letter-spacing: 1px;
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .speaking-hub p { color: #fff; font-weight: 600; font-size: 1.2rem; margin-bottom: 10px; }

        .speaking-starters { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px;}
        .starter-chip { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 8px 16px; border-radius: 50px; font-size: 0.95rem; color: #EBEBEB; cursor: pointer; font-weight: 600; transition: 0.2s;}
        .starter-chip:hover { background: var(--accent); color: #000; border-color: var(--accent); transform: scale(1.05);}

        /* --- INTERACTIVE MODULES --- */
        .choice-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .choice-card { padding: 30px; text-align: center; cursor: pointer; background: rgba(255,255,255,0.03); border-radius: 16px; transition: all 0.3s; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 20px rgba(0,0,0,0.2);}
        .choice-card:hover { background: rgba(212, 175, 55, 0.08); border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 15px 30px rgba(212, 175, 55, 0.2);}
        .choice-card h3 { font-family: var(--font-academic); font-size: 1.6rem; margin-bottom: 10px; color: #fff;}
        .choice-card p { font-size: 1rem; color: var(--text-dim); margin: 0;}

        /* --- THE ARENA (CUE CARDS) --- */
        .arena-grid { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap;}
        .arena-card { width: 280px; height: 380px; perspective: 1000px; cursor: pointer; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; position: relative; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.6);}
        .arena-card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; border-radius: 24px; }
        .card-front { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); font-size: 5rem; color: var(--accent); backdrop-filter: blur(10px);}
        .card-back { background: var(--accent); transform: rotateY(180deg); color: #000; border: none; box-shadow: inset 0 0 20px rgba(0,0,0,0.2); }
        .card-back h3 { color: #000; font-family: var(--font-display); font-size: 2rem; margin-bottom: 10px; text-shadow: none;}
        .card-back p { color: #121212; font-weight: 600; font-size: 1.1rem; }

        /* Text Analysis Blocks */
        .text-reading { background: rgba(255,255,255,0.03); padding: 40px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); font-size: 1.3rem; line-height: 1.8; color: #EBEBEB; font-family: var(--font-academic);}
        .highlight-zone { padding: 35px; background: rgba(255,255,255,0.02); border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border); text-align: center; font-size: 1.5rem; line-height: 1.8; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);}

        /* Error Finder */
        .error-sentence { font-size: 1.8rem; word-spacing: 5px; line-height: 2; font-weight: 600; text-align: center; font-family: var(--font-academic);}
        .error-word { display: inline-block; padding: 6px 12px; cursor: pointer; border-radius: 8px; transition: 0.2s; border: 1px solid transparent;}
        .error-word:hover { background: rgba(255,255,255,0.1); border-color: rgba(212, 175, 55, 0.4);}

        /* SENTENCE BUILDER */
        .drop-zone { min-height: 120px; border: 2px dashed rgba(255,255,255,0.2); border-radius: 16px; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; padding: 20px; gap: 12px; flex-wrap: wrap; background: rgba(0, 0, 0, 0.4); transition: 0.3s;}
        .drop-zone.success { border-color: var(--correct); border-style: solid; background: rgba(29, 185, 84, 0.1); box-shadow: inset 0 0 30px rgba(29,185,84,0.15); }
        .word-bank { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        
        .word-chip { 
            padding: 14px 28px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; 
            cursor: pointer; user-select: none; transition: all 0.3s; font-weight: 600; 
            color: #fff; font-size: 1.1rem; box-shadow: 0 5px 15px rgba(0,0,0,0.3); font-family: var(--font-body);
        }
        .word-chip:hover { background: var(--accent); color: #000; border-color: var(--accent); transform: translateY(-4px); }
        .word-chip.used { opacity: 0; pointer-events: none; transform: scale(0.8); }

        /* Chat Scenario */
        .chat-container { display: flex; flex-direction: column; gap: 20px; margin-top: 20px;}
        .msg { padding: 18px 25px; border-radius: 20px; max-width: 85%; font-size: 1.15rem; line-height: 1.5; text-align: left;}
        .msg.friend { background: rgba(0,0,0,0.5); align-self: flex-start; border-bottom-left-radius: 4px; color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .msg.you { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; display: none; font-weight: 700; box-shadow: 0 5px 15px var(--accent-glow);}
        .chat-option { padding: 18px; background: rgba(255,255,255,0.05); border-radius: 12px; cursor: pointer; text-align: left; color: #fff; font-weight: 700; border: 1px solid rgba(255,255,255,0.15); transition: 0.3s;}
        .chat-option:hover { background: rgba(212, 175, 55, 0.1); border-color: var(--accent); transform: translateX(8px); color: var(--accent);}

        /* Timer Box */
        .timer-display { font-family: var(--font-code); font-size: 4.5rem; font-weight: 900; color: var(--incorrect); text-shadow: 0 0 20px rgba(229, 9, 20, 0.4); margin: 20px 0; letter-spacing: 2px;}

        /* --- HEADERS & FOOTERS --- */
        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 90px; padding: 0 40px;
            display: flex; align-items: center; justify-content: space-between; z-index: 100;
            background: linear-gradient(to bottom, rgba(3,8,17,0.95), transparent);
        }
        .logo { font-family: var(--font-display); font-weight: 900; font-size: 1.1rem; color: #fff; letter-spacing: 2px;}
        .logo span { color: var(--accent); }
        
        .progress-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.05); }
        .progress-bar { height: 100%; width: 0%; background: var(--accent); transition: width 0.4s ease; box-shadow: 0 0 15px var(--accent-glow); }

        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 100px; padding: 0 50px;
            background: linear-gradient(to top, rgba(3,8,17,1), rgba(3,8,17,0.8)); border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: space-between; z-index: 90; backdrop-filter: blur(20px);
        }

        /* --- ASIDE PANELS --- */
        .whiteboard-panel { position: fixed; bottom: 110px; right: 40px; width: 450px; height: 500px; background: rgba(10,12,20,0.98); border: 1px solid var(--border); border-radius: 20px; z-index: 101; transform: translateY(120%) scale(0.9); display: flex; flex-direction: column; transition: all 0.5s cubic-bezier(0.3, 0, 0, 1); box-shadow: 0 30px 60px rgba(0,0,0,0.9); backdrop-filter: blur(30px); opacity: 0;}
        .whiteboard-panel.open { transform: translateY(0) scale(1); opacity: 1;}
        .wb-header { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; font-family: var(--font-display); font-size: 1.1rem; color: #fff; letter-spacing: 1px;}
        .wb-content { flex: 1; padding: 25px; outline: none; color: var(--accent); font-family: monospace; font-size: 1.1rem; resize: none; border: none; background: transparent; line-height: 1.8;}
    </style>
</head>
<body>

    <div class="ambient-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <header class="header">
        <div class="logo"><i class="fa-solid fa-microphone-lines" style="color:var(--accent); margin-right:8px;"></i> WOLF LABS <span>|</span> IELTS ACADEMIC SPEAKING</div>
        <div class="controls">
            <button class="icon-btn" onclick="toggleWhiteboard()" title="Teacher's Whiteboard"><i class="fa-solid fa-chalkboard"></i></button>
            <button class="icon-btn" onclick="toggleFullscreen()" title="Fullscreen Mode"><i class="fa-solid fa-expand"></i></button>
        </div>
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    </header>

    <main id="main-container"></main>

    <nav class="nav-bar">
        <button class="btn" style="background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #fff;" id="prevBtn" onclick="prevStep()" disabled><i class="fa-solid fa-arrow-left"></i> BACK</button>
        <div style="font-family: var(--font-display); font-weight: 800; font-size: 1rem; color: var(--text-dim); letter-spacing: 3px;" id="step-counter">BAND 5.0+ (1/25)</div>
        <button class="btn btn-accent" id="nextBtn" onclick="nextStep()">NEXT STAGE <i class="fa-solid fa-arrow-right"></i></button>
    </nav>

    <!-- WHITEBOARD -->
    <aside class="whiteboard-panel" id="whiteboardPanel">
        <div class="wb-header"><span><i class="fa-solid fa-pen-nib" style="color:var(--accent); margin-right: 10px;"></i> Teacher's Board</span><button class="icon-btn" style="width: 35px; height: 35px; border:none; background:transparent;" onclick="toggleWhiteboard()"><i class="fa-solid fa-xmark"></i></button></div>
        <textarea class="wb-content" placeholder="> Type IELTS grammar rules, vocabulary, or corrections here..."></textarea>
    </aside>

    <script>
        // --- LESSON CONTENT (EXTENDED TO 25 STEPS) ---
        const stepsData = [
            // 0: GUIDE
            `<div class="glass-panel" style="max-width: 850px; margin: 0 auto;">
                <h2><i class="fa-solid fa-user-shield"></i> Examiner Guide: The Foundation</h2>
                <div style="border-left: 4px solid var(--accent); padding-left: 25px; margin: 30px 0; background: rgba(212, 175, 55, 0.05); padding-top: 20px; padding-bottom: 20px; border-radius: 0 12px 12px 0;">
                    <p style="font-family: var(--font-code); color: var(--accent); margin-bottom: 10px;">/* MISSION BRIEFING */</p>
                    <p><strong>Topic:</strong> IELTS Speaking (Part 1 & 2).</p>
                    <p><strong>Target Band:</strong> 5.0 - 6.0 (CEFR B1 - B2)</p>
                    <p><strong>Objective:</strong> Eradicate one-word answers. Teach the student to expand ideas using the A.R.E. formula (Answer, Reason, Example) and use interactive timers to simulate Part 2 (Cue Card) pressure.</p>
                </div>
                <button class="btn btn-accent" onclick="this.style.display='none'; unlockPrompt('p0')"><i class="fa-solid fa-microphone"></i> Initialize System</button>
                <div class="speaking-hub" id="p0" style="display:none;">
                    <p>Teacher: Welcome the candidate. Ask: "Are you nervous about the Speaking test? What is the hardest part for you?"</p>
                </div>
            </div>`,
            
            // 1: HERO
            `<div class="glass-panel" style="width: 100%; background: transparent; border: none; box-shadow: none; padding: 0;">
                <div class="dual-panel" style="align-items: center;">
                    <div style="flex: 1.2;">
                        <span class="code-tag" style="margin-bottom: 15px;">IELTS SPEAKING | PART 1 & 2</span>
                        <h1 style="font-size: 5rem; margin-top: 10px;">The<br>Foundation</h1>
                        <p style="font-size: 1.3rem;">Stop giving one-word answers. Learn the formula to speak confidently, expand your ideas, and eliminate test anxiety.</p>
                        <button class="btn btn-accent" style="margin-top: 30px;" onclick="this.style.display='none'; unlockPrompt('p1')"><i class="fa-solid fa-play"></i> Start Training</button>
                    </div>
                    <div style="flex: 0.8;">
                        <div style="background: rgba(255,255,255,0.02); padding: 40px; border-radius: 20px; border: 1px solid var(--border); text-align: center;">
                            <i class="fa-solid fa-comments" style="font-size: 4rem; color: var(--accent); margin-bottom: 20px;"></i>
                            <h3 style="color: #fff; font-size: 1.8rem;">Target Band: 5.5+</h3>
                            <p style="font-size: 1rem; margin:0; color:var(--text-dim);">Focus: Fluency & Idea Expansion</p>
                        </div>
                        <div class="speaking-hub" id="p1" style="display:none;">
                            <p>Teacher: Ask the student: "In Part 1 of the IELTS, the examiner asks simple questions about your life. Sounds easy, right?"</p>
                        </div>
                    </div>
                </div>
            </div>`,

            // 2: VIBE CHECK (Warm-up)
            `<div class="glass-panel" style="text-align: center;">
                <h2><i class="fa-solid fa-user-astronaut"></i> The Vibe Check</h2>
                <p>Before we start, what is your communication style in your native language?</p>
                <div class="choice-grid" style="margin-top: 30px;">
                    <div class="choice-card" onclick="selectCard(this); unlockPrompt('p2')">
                        <i class="fa-solid fa-comment-dots"></i>
                        <h3>Shy & Quiet</h3>
                        <p>I answer with few words.</p>
                    </div>
                    <div class="choice-card" onclick="selectCard(this); unlockPrompt('p2')">
                        <i class="fa-solid fa-bullhorn"></i>
                        <h3>Talkative</h3>
                        <p>I love explaining details.</p>
                    </div>
                </div>
                <div class="speaking-hub" id="p2" style="display:none; text-align: left;">
                    <p>Teacher: Discuss the student's profile. Tell them that in IELTS, even shy people need to "act" a little to show their vocabulary.</p>
                </div>
            </div>`,

            // 3: THE BIGGEST MISTAKE
            `<div class="glass-panel">
                <h2><i class="fa-solid fa-triangle-exclamation"></i> The Biggest Mistake</h2>
                <p>Look at this conversation from an IELTS Exam. Why will this student get a Band 4.0?</p>
                
                <div class="chat-container" style="margin-bottom: 30px;">
                    <div class="msg friend">
                        <span class="msg-name">EXAMINER</span>
                        "Do you like your hometown?"
                    </div>
                    <div class="msg you" style="display:block; background: rgba(229, 9, 20, 0.15); border: 1px solid var(--incorrect); color: #fff; box-shadow:none;">
                        <span class="msg-name" style="color:#fff;">STUDENT (BAND 4.0)</span>
                        "Yes, I like it."
                    </div>
                </div>

                <div class="choice-grid">
                    <div class="choice-card" onclick="selectCard(this); unlockPrompt('p3')"><h3>Grammar is wrong</h3></div>
                    <div class="choice-card" onclick="selectCard(this); unlockPrompt('p3')"><h3>Too short. No details.</h3></div>
                </div>
                <div class="speaking-hub" id="p3" style="display:none;">
                    <p>Teacher: Confirm the second answer is correct. The examiner cannot assess vocabulary if the student doesn't speak!</p>
                </div>
            </div>`,

            // 4: THE FORMULA
            `<div class="glass-panel" style="text-align:center;">
                <h2><i class="fa-solid fa-flask"></i> Strategy: The A.R.E. Formula</h2>
                <p style="font-size: 1.2rem; margin-bottom: 30px;">Whenever the examiner asks a question in Part 1, use these 3 steps.</p>
                
                <div style="display: flex; gap: 20px; justify-content: center; margin-bottom: 30px; text-align: left;">
                    <div style="background: rgba(255,255,255,0.03); border: 1px solid var(--accent); padding: 25px; border-radius: 16px; flex: 1;">
                        <h3 style="color: var(--accent); font-size: 1.5rem;">1. Answer</h3>
                        <p style="font-size: 1.1rem; color: #fff; margin:0;">Directly answer the question. (Yes/No/Depends).</p>
                    </div>
                    <div style="background: rgba(255,255,255,0.03); border: 1px solid var(--accent); padding: 25px; border-radius: 16px; flex: 1;">
                        <h3 style="color: var(--accent); font-size: 1.5rem;">2. Reason</h3>
                        <p style="font-size: 1.1rem; color: #fff; margin:0;">Say WHY. Use "Because" or "Since".</p>
                    </div>

                    <button class="btn btn-accent" id="btn-speak-2" style="display:none; margin: 20px auto;" onclick="this.style.display='none'; document.getElementById('timer-prep-2').style.display='none'; startTimer('timer-speak-2', 'btn-next-22', 120, 'speak-hub-22-done')"><i class="fa-solid fa-play"></i> Start 2-Min Speaking</button>
                    <h1 id="timer-speak-2" style="display:none; color:var(--incorrect); font-family:var(--font-code); font-size: 5rem; margin: 20px 0;">2:00</h1>
                </div>

                <div class="speaking-hub" id="speak-hub-22" style="display:none; text-align:center;">
                    <p>Teacher: One more minute for notes (keywords only!).</p>
                </div>
                <div class="speaking-hub" id="speak-hub-22-done" style="display:none; text-align:center;">
                    <p>Teacher: Excellent! Did the student use better vocabulary (Thrilled, Massive, Passionate)?</p>
                </div>
            </div>`,

            // 23: FINAL CHALLENGE
            `<div>
                <h2 style="text-align:center; font-size:3.5rem;"><i class="fa-solid fa-comments"></i> The Final Interview</h2>
                <p style="text-align:center; font-size:1.3rem;">Let's put everything together. The examiner (teacher) will ask you 3 unexpected questions.</p>
                <div class="choice-grid" style="max-width: 800px; margin: 40px auto;">
                    <div class="choice-card" onclick="genericCorrect(this, false)"><h3><i class="fa-solid fa-hand"></i> I need a second.</h3></div>
                    <div class="choice-card" onclick="genericCorrect(this, true, 'p23')"><h3><i class="fa-solid fa-rocket"></i> I'm ready! Let's talk.</h3></div>
                </div>
                <div class="speaking-hub" id="p23" style="display:none;">
                    <p>Teacher: Ask these 3 questions (demand the A.R.E. formula):<br>1. Do you prefer reading books or watching movies?<br>2. What is your favorite season of the year?<br>3. Do you like cooking?</p>
                </div>
            </div>`,

            // 24: END
            `<div class="glass-panel" style="text-align: center; border: 1px solid var(--correct); background: rgba(29, 185, 84, 0.05); box-shadow: 0 0 100px rgba(29, 185, 84, 0.2);">
                <i class="fa-solid fa-award" style="font-size: 5rem; color: var(--correct); margin-bottom: 20px;"></i>
                <h1 style="color: var(--correct); font-size: 4.5rem; text-shadow: none;">Mission Logged</h1>
                <p style="font-size: 1.5rem;">IELTS Speaking Foundation Completed.</p>
                <div style="background: rgba(0,0,0,0.4); padding: 40px; border-radius: 20px; max-width: 600px; margin: 40px auto; text-align: left; border: 1px solid rgba(255,255,255,0.1);">
                    <span style="color:var(--accent); font-family: var(--font-display); font-weight: 800; font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; display: block; margin-bottom: 20px;"><i class="fa-solid fa-database"></i> Session Data</span>
                    <ul style="color:#fff; list-style:none; font-size: 1.2rem; line-height: 2;">
                        <li><i class="fa-solid fa-check" style="color:var(--accent); margin-right:15px;"></i> The A.R.E. Formula (Answer, Reason, Example)</li>
                        <li><i class="fa-solid fa-check" style="color:var(--accent); margin-right:15px;"></i> Lexical Upgrade (Eliminated "Very" and "I like")</li>
                        <li><i class="fa-solid fa-check" style="color:var(--accent); margin-right:15px;"></i> Part 1 Fluency Training</li>
                        <li><i class="fa-solid fa-check" style="color:var(--accent); margin-right:15px;"></i> Part 2 Cue Card Live Simulation</li>
                    </ul>
                </div>
                <button class="btn btn-accent" style="padding: 20px 60px; font-size: 1.3rem;" onclick="alert('Data synced.')"><i class="fa-solid fa-upload"></i> Close Session</button>
            </div>`
        ];

        // --- CORE LOGIC ---
        let currentStep = 0;
        const totalSteps = stepsData.length;
        const mainContainer = document.getElementById('main-container');

        function initializeSteps() {
            mainContainer.innerHTML = '';
            stepsData.forEach((htmlContent, index) => {
                const section = document.createElement('section');
                section.className = 'step';
                section.id = `step-${index}`;
                section.innerHTML = htmlContent;
                mainContainer.appendChild(section);
            });
            updateUI();
        }

        function updateUI() {
            document.querySelectorAll('.step').forEach((step, index) => {
                if(index === currentStep) step.classList.add('active');
                else step.classList.remove('active');
            });

            document.getElementById('prevBtn').disabled = currentStep === 0;
            document.getElementById('nextBtn').style.display = currentStep === totalSteps - 1 ? 'none' : 'block';
            document.getElementById('step-counter').innerText = `BAND 5.0+ (${currentStep + 1}/${totalSteps})`;
            
            const pb = document.getElementById('progressBar');
            if (pb) pb.style.width = `${((currentStep + 1) / totalSteps) * 100}%`;

            mainContainer.scrollTo(0, 0);
        }

        function nextStep() { if (currentStep < totalSteps - 1) { currentStep++; updateUI(); } }
        function prevStep() { if (currentStep > 0) { currentStep--; updateUI(); } }

        function unlockPrompt(id) { const el = document.getElementById(id); if (el) el.style.display = 'block'; }

        function selectCard(card) {
            const parent = card.closest('.choice-grid');
            parent.querySelectorAll('.choice-card').forEach(el => { el.style.opacity = '0.4'; el.style.borderColor = 'var(--border)'; });
            card.style.opacity = '1'; card.style.borderColor = 'var(--accent)';
        }

        function genericCorrect(btn, isCorrect, promptIdStr) {
            const parent = btn.parentElement;
            let attempts = parseInt(parent.dataset.attempts || '0');
            const options = Array.from(parent.querySelectorAll('div, button, span')).filter(b => b.hasAttribute('onclick') && b.getAttribute('onclick').includes('genericCorrect'));
            const maxAttempts = Math.min(3, options.length - 1);
            let promptIdToUnlock = promptIdStr;

            if(isCorrect) {
                options.forEach(b => b.style.pointerEvents = 'none');
                btn.style.backgroundColor = 'var(--correct)'; btn.style.color = '#000'; btn.style.borderColor = 'var(--correct)';
                if (promptIdToUnlock) unlockPrompt(promptIdToUnlock);
            } else {
                attempts++; parent.dataset.attempts = attempts;
                btn.style.backgroundColor = 'var(--incorrect)'; btn.style.color = '#fff'; btn.style.borderColor = 'var(--incorrect)'; btn.style.animation = 'shake 0.4s'; btn.style.pointerEvents = 'none';
                if (attempts >= maxAttempts) {
                    options.forEach(b => b.style.pointerEvents = 'none');
                    const correctBtn = options.find(b => b.getAttribute('onclick') && b.getAttribute('onclick').includes('true'));
                    if (correctBtn) { correctBtn.style.backgroundColor = 'var(--correct)'; correctBtn.style.color = '#000'; correctBtn.style.borderColor = 'var(--correct)'; }
                    if (promptIdToUnlock) setTimeout(() => unlockPrompt(promptIdToUnlock), 500);
                }
            }
        }

        let buildState = {};
        function moveWord(chip, dzId, targetArrayInput, promptId) {
            if(chip.classList.contains('used')) return;
            
            let targetArray;
            if (typeof targetArrayInput === 'string') {
                targetArray = JSON.parse(targetArrayInput.replace(/'/g, '"'));
            } else {
                targetArray = targetArrayInput;
            }
            
            const word = chip.innerText;
            const dz = document.getElementById(dzId);
            
            const newChip = document.createElement('div');
            newChip.className = 'word-chip'; 
            newChip.innerText = word;
            
            if (!chip.id) chip.id = 'chip_' + Math.random().toString(36).substr(2, 9);
            newChip.dataset.sourceId = chip.id;
            newChip.onclick = function() {
                if(dz.classList.contains('success')) return;
                dz.removeChild(this);
                document.getElementById(this.dataset.sourceId).classList.remove('used');
                const idx = buildState[dzId].lastIndexOf(this.innerText);
                if(idx !== -1) buildState[dzId].splice(idx, 1);
            };

            dz.appendChild(newChip); chip.classList.add('used');
            if(!buildState[dzId]) buildState[dzId] = [];
            buildState[dzId].push(word);

            if(buildState[dzId].length === targetArray.length) {
                if(JSON.stringify(buildState[dzId]) === JSON.stringify(targetArray)) {
                    dz.classList.add('success'); 
                    Array.from(dz.children).forEach(c => { c.style.background = 'var(--correct)'; c.style.color = '#000'; c.style.cursor = 'default'; c.style.borderColor = 'var(--correct)'; });
                    unlockPrompt(promptId);
                } else {
                    let attempts = parseInt(dz.dataset.attempts || '0') + 1;
                    dz.dataset.attempts = attempts;
                    dz.style.borderColor = 'var(--incorrect)'; dz.style.animation = 'shake 0.4s';
                    
                    if (attempts >= 3) {
                        setTimeout(() => {
                            dz.innerHTML = ''; dz.style.borderColor = ''; dz.style.animation = ''; dz.classList.add('success');
                            targetArray.forEach(w => {
                                const finalChip = document.createElement('div');
                                finalChip.className = 'word-chip'; finalChip.style.background = 'var(--correct)'; finalChip.style.color = '#000'; finalChip.style.borderColor = 'var(--correct)'; finalChip.innerText = w;
                                dz.appendChild(finalChip);
                            });
                            chip.parentElement.querySelectorAll('.word-chip').forEach(c => c.classList.add('used'));
                            setTimeout(() => unlockPrompt(promptId), 500);
                        }, 1000);
                    } else {
                        setTimeout(() => {
                            dz.innerHTML = ''; dz.style.borderColor = 'rgba(255,255,255,0.2)'; dz.style.animation = ''; buildState[dzId] = [];
                            chip.parentElement.querySelectorAll('.word-chip').forEach(c => c.classList.remove('used'));
                        }, 1000);
                    }
                }
            }
        }

        function handleChat(btn, isCorrect, containerId, promptId) {
            const container = document.getElementById(containerId);
            let attempts = parseInt(container.dataset.attempts || '0');
            const options = Array.from(container.querySelectorAll('.chat-option'));
            const maxAttempts = Math.min(3, options.length - 1);

            if(isCorrect) {
                options.forEach(b => b.style.pointerEvents = 'none');
                btn.style.backgroundColor = 'var(--correct)'; btn.style.color = '#000'; btn.style.borderColor = 'var(--correct)';
                setTimeout(() => { container.innerHTML = `<div class="msg you" style="display:block;">${btn.innerText}</div>`; unlockPrompt(promptId); }, 800);
            } else {
                attempts++; container.dataset.attempts = attempts;
                btn.style.backgroundColor = 'var(--incorrect)'; btn.style.color = '#fff'; btn.style.borderColor = 'var(--incorrect)'; btn.style.animation = 'shake 0.4s'; btn.style.pointerEvents = 'none';
                if (attempts >= maxAttempts) {
                    const correctBtn = options.find(b => b.getAttribute('onclick').includes('true'));
                    options.forEach(b => b.style.pointerEvents = 'none');
                    if (correctBtn) {
                        correctBtn.style.backgroundColor = 'var(--correct)'; correctBtn.style.color = '#000'; correctBtn.style.borderColor = 'var(--correct)';
                        setTimeout(() => { container.innerHTML = `<div class="msg you" style="display:block;">${correctBtn.innerText}</div>`; unlockPrompt(promptId); }, 1000);
                    }
                } else {
                    setTimeout(() => { btn.style.animation = ''; btn.style.backgroundColor = 'rgba(255,255,255,0.03)'; btn.style.borderColor = 'var(--border)'; }, 800);
                }
            }
        }

        let matchS1 = null; let matchesF1 = 0;
        function handleMatch(card, matchVarName, matchesFoundVarName, targetMatches, promptId) {
            if(card.style.opacity === '0') return;
            if(!window[matchVarName]) { window[matchVarName] = card; card.style.borderColor = 'var(--accent)'; }
            else {
                if(window[matchVarName].dataset.val === card.dataset.val && window[matchVarName] !== card) { 
                    window[matchVarName].style.opacity = '0'; card.style.opacity = '0'; 
                    window[matchesFoundVarName]++;
                    if(window[matchesFoundVarName] === targetMatches) unlockPrompt(promptId);
                } else { 
                    window[matchVarName].style.borderColor = 'var(--border)'; card.style.animation = 'shake 0.4s'; 
                    setTimeout(() => card.style.animation = '', 400);
                }
                window[matchVarName] = null;
            }
        }

        function flipCard(card, promptId) {
            if(!card.classList.contains('flipped')) { card.classList.add('flipped'); unlockPrompt(promptId); }
        }

        let routinesClicked = 0;
        function checkRoutine(promptId) {
            routinesClicked++;
            if(routinesClicked >= 3) {
                setTimeout(() => unlockPrompt(promptId), 500);
            }
        }

        // --- TIMER LOGIC ---
        window.startTimer = function(displayId, btnId, totalSeconds, unlockId) {
            const display = document.getElementById(displayId);
            const btn = document.getElementById(btnId);
            if(btn) btn.style.display = 'none';
            display.style.display = 'block';

            let remaining = totalSeconds;
            display.innerText = formatTime(remaining);
            
            // Add pulse alert if speaking phase
            if (totalSeconds > 60) {
                display.style.animation = 'pulseAlert 1s infinite';
            }

            const interval = setInterval(() => {
                remaining--;
                display.innerText = formatTime(remaining);
                if(remaining <= 0) {
                    clearInterval(interval);
                    display.innerText = "TIME'S UP";
                    display.style.animation = 'none';
                    display.style.color = "var(--incorrect)";
                    display.style.textShadow = "0 0 20px rgba(229, 9, 20, 0.6)";
                    if(unlockId) unlockPrompt(unlockId);
                    
                    // Force enable next button
                    document.getElementById('nextBtn').disabled = false;
                    document.getElementById('nextBtn').classList.add('ready');
                }
            }, 1000);
        };

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        window.onload = initializeSteps;
    </script>
</body>
</html>
